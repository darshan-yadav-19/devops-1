<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darshan Yadav — DevOps Engineer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 60px;
            max-width: 700px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #a78bfa;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            margin: 0 auto 30px auto;
            border-radius: 2px;
        }

        .tools-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .tools {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }

        .tool-badge {
            background: linear-gradient(135deg, #a78bfa22, #60a5fa22);
            border: 1px solid rgba(167, 139, 250, 0.4);
            color: #c4b5fd;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .date {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 10px;
        }

        .status {
            display: inline-block;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">👨‍💻</div>
        <h1>Hello, I am Darshan 123 </h1>
        <h2>DevOps Engineer</h2>
        <div class="divider"></div>
        <div class="status">⚡ Deployed via Jenkins + Docker + AWS</div>
        <p class="tools-title">Tools I Work With</p>
        <div class="tools">
            <span class="tool-badge">🐧 Linux</span>
            <span class="tool-badge">☁️ AWS</span>
            <span class="tool-badge">🐳 Docker</span>
            <span class="tool-badge">☸️ Kubernetes</span>
            <span class="tool-badge">🏗️ Terraform</span>
            <span class="tool-badge">🔧 Jenkins</span>
            <span class="tool-badge">🐙 Git & GitHub</span>
        </div>
        <p class="date">📅 April 27, 2026</p>
    </div>
</body>
</html>
